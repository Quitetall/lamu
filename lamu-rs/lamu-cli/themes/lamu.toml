thinking_verbs = ["thinking", "reasoning", "considering", "computing"]

[branding]
agent_name = "lamu"
welcome = "lamu chat — type a message or /help for commands."
goodbye = "session ended."
response_label = " lamu "
prompt_symbol = "❯ "
help_header = "lamu commands"

tool_prefix = "│"

[tool_emojis]
terminal = "$"
web_search = "🔍"
read_file = "📄"
write_file = "✎"
search_files = "🔎"
execute_code = "⚡"
browser_navigate = "🌐"
delegate_task = "▶"
mixture_of_agents = "⚗"
memory = "◐"
clarify = "?"
cronjob = "↻"
process = "⚙"
todo = "☐"

banner_logo = """
