# Harnesses installed on this machine that should talk to lamu.
# Exactly one entry should set `default: true` — `just open` (no args)
# launches that one with the right env wired up.
#
# flavor: anthropic | openai | ollama  — picks which env vars are set
#         to point the harness at lamu (:8020 by default).
# cmd:    shell command to launch. Args appended verbatim after `open`.
# extra_env: optional extra env vars (e.g. ANTHROPIC_MODEL).

harnesses:
  claude-code:
    default: true
    flavor: anthropic
    cmd: claude
    # ANTHROPIC_MODEL is best left unset so the harness's own pick goes
    # through; lamu's router resolves "lamu"/"default"/null → main entry.

  claude-code-mimo:
    # Same `claude` binary but routed through Xiaomi MiMo's
    # Anthropic-compat endpoint instead of through lamu serve. Saves
    # Opus tokens on routine code by using mimo-v2.5-pro for the
    # implementation work; reserve Opus for plan + review.
    #
    # Requires MIMO_API_KEY in ~/.config/lamu/api-keys.env.
    # extra_env values starting with `$` are expanded by open-harness.sh.
    flavor: anthropic
    cmd: claude
    extra_env:
      ANTHROPIC_BASE_URL: https://token-plan-sgp.xiaomimimo.com/anthropic
      ANTHROPIC_API_KEY: $MIMO_API_KEY
      ANTHROPIC_MODEL: mimo-v2.5-pro

  crush:
    flavor: anthropic
    cmd: crush

  crush-mimo:
    # crush via MiMo's Anthropic-compat mirror.
    flavor: anthropic
    cmd: crush
    extra_env:
      ANTHROPIC_BASE_URL: https://token-plan-sgp.xiaomimimo.com/anthropic
      ANTHROPIC_API_KEY: $MIMO_API_KEY
      ANTHROPIC_MODEL: mimo-v2.5-pro

  codex:
    flavor: openai
    cmd: codex

  codex-mimo:
    # codex via MiMo's OpenAI-compat endpoint.
    flavor: openai
    cmd: codex
    extra_env:
      OPENAI_BASE_URL: https://token-plan-sgp.xiaomimimo.com/v1
      OPENAI_API_KEY: $MIMO_API_KEY
      OPENAI_MODEL: mimo-v2.5-pro

  cursor:
    flavor: openai
    # Cursor is GUI — `just open cursor` is mostly aspirational; you set
    # the base URL inside Cursor settings once.
    cmd: cursor

  aider:
    flavor: openai
    cmd: aider
    extra_env:
      AIDER_MODEL: openai/lamu

  aider-mimo:
    # aider via MiMo's OpenAI-compat endpoint. AIDER_MODEL must use
    # the openai/<id> prefix even though we override the base URL.
    flavor: openai
    cmd: aider
    extra_env:
      OPENAI_API_BASE: https://token-plan-sgp.xiaomimimo.com/v1
      OPENAI_API_KEY: $MIMO_API_KEY
      AIDER_MODEL: openai/mimo-v2.5-pro

  continue:
    flavor: openai
    # ~/.continue/config.json must be edited once to point at lamu.
    cmd: code  # opens VS Code; Continue lives inside it.

  pi:
    flavor: openai
    cmd: pi

  pi-mimo:
    # pi reads ~/.pi/agent/models.json — does NOT honor OPENAI_BASE_URL.
    # Requires the `mimo` provider entry registered in that file. Run
    # ./scripts/setup-pi-mimo.sh once to install, then `just open pi-mimo`
    # routes via MiMo with `--provider mimo --model mimo-v2.5-pro`.
    flavor: openai
    cmd: pi

  hermes:
    flavor: anthropic
    # ECC operator. Adjust to the right launch verb on your install.
    cmd: hermes

  hermes-mimo:
    # hermes via MiMo's Anthropic-compat mirror.
    flavor: anthropic
    cmd: hermes
    extra_env:
      ANTHROPIC_BASE_URL: https://token-plan-sgp.xiaomimimo.com/anthropic
      ANTHROPIC_API_KEY: $MIMO_API_KEY
      ANTHROPIC_MODEL: mimo-v2.5-pro

  anything-llm:
    flavor: ollama
    cmd: anythingllm-desktop

  open-webui:
    flavor: ollama
    # `open-webui serve --port 7070` is one pattern; tweak per install.
    cmd: open-webui serve
