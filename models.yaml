# Model registry — source of truth for the full stack
# Each model needs: id, engine, and engine-specific config

models:
  - id: qwen3.5-27b
    name: "Qwen3.5-27B DFlash"
    engine: dflash
    path: ~/models/qwen3.5-27b-gguf/Qwen3.5-27B-Q4_K_M.gguf
    draft: ~/models/draft-35/model.safetensors
    port: 8000
    context: 8192
    max_ctx: 8192

  - id: gpt2-xl
    name: "GPT-2 XL (raw)"
    engine: sglang
    port: 8001
    context: 1024

  # GPT-2 presets — routed via gpt2_proxy (:9001) → SGLang (:8001)
  - id: shitty-best2021
    name: "GPT-2 XL — Best 2021"
    engine: gpt2-proxy
    port: 9001
    temperature: 0.72
    top_p: 0.95
    max_tokens: 300
    context: 256

