name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python-tests:
    name: Python tests (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dev dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run unit tests
        run: uv run pytest tests/unit -v

      - name: Run integration tests
        run: uv run pytest tests/integration --override-ini="addopts="

  rust-tests:
    name: Rust workspace tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            lamu-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('lamu-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        working-directory: lamu-rs
        run: cargo build --workspace --tests

      - name: Test
        working-directory: lamu-rs
        run: cargo test --workspace

      - name: Clippy
        working-directory: lamu-rs
        run: cargo clippy --workspace -- -D warnings

  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      # Soft lint — not enforced yet. Surfaces issues without failing CI.
      - name: Run ruff
        run: ruff check lamu agents cli web server tests || true
