name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python-tests:
    name: Python tests (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dev dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run unit tests with coverage gate
        run: uv run pytest tests/unit -v --cov=lamu --cov-report=term --cov-report=xml

      - name: Run integration tests
        run: uv run pytest tests/integration --override-ini="addopts="

      - name: Run contract tests (Python MCP only — Rust binary not yet built here)
        run: uv run pytest tests/contract -m contract -k python --override-ini="addopts="

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
        if: always()

  rust-tests:
    name: Rust workspace tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            lamu-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('lamu-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        working-directory: lamu-rs
        run: cargo build --workspace --tests

      - name: Test
        working-directory: lamu-rs
        run: cargo test --workspace

      - name: Build release binary (for cross-language contract tests)
        working-directory: lamu-rs
        run: cargo build --release -p lamu-cli

      - name: Set up Python for contract parity
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install lamu (Python) for contract tests
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run cross-language MCP parity tests
        run: uv run pytest tests/contract -m contract --override-ini="addopts="

      - name: Clippy
        working-directory: lamu-rs
        run: cargo clippy --workspace -- -D warnings

  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      # lamu/ is the v2/v3 daemon — fail on any lint there. Legacy paths
      # (agents/, cli/, web/, server/) stay soft until they're migrated.
      - name: Run ruff (lamu/ — strict)
        run: ruff check lamu

      - name: Run ruff (legacy — soft)
        run: ruff check agents cli web server tests || true
